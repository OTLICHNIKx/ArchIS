$kind: http-request
name: Register
description: Register a new user account. Returns user data and JWT token on success.
method: POST
url: '{{baseUrl}}/api/auth/register'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "testuser",
      "email": "testuser@example.com",
      "password": "password123"
    }
