$kind: http-request
name: Login
description: Authenticate user and receive JWT token. Use the returned token for protected endpoints.
method: POST
url: '{{baseUrl}}/api/auth/login'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "testuser@example.com",
      "password": "password123"
    }
