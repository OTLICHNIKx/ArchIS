$kind: http-request
name: Update Track Metadata
description: Update track metadata (title, genre, tags, etc.). Requires authentication.
method: PATCH
url: '{{baseUrl}}/api/artists/tracks/{{trackId}}'
order: 8000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: trackId
    value: '{{trackId}}'
    description: The track ID to update
body:
  type: json
  content: |-
    {
      "title": "Updated Track Title",
      "genre": "Rock",
      "tags": ["rock", "guitar"],
      "description": "Updated description",
      "isPublic": false
    }
