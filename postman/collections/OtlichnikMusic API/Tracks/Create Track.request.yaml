$kind: http-request
name: Create Track
description: Create a new track with metadata. Requires authentication.
method: POST
url: '{{baseUrl}}/api/artists/{{artistId}}/tracks'
order: 1000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: artistId
    value: '{{artistId}}'
    description: The artist (user) ID
body:
  type: json
  content: |-
    {
      "title": "My New Track",
      "genre": "Electronic",
      "tags": ["chill", "ambient"],
      "description": "A relaxing electronic track",
      "duration": 180,
      "isPublic": true
    }
