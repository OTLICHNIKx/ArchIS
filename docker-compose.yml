version: '3.8'

services:

  # База данных MongoDB
  mongo:
    image: mongo:7
    container_name: otlichnikmusic-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"           # проброс порта наружу (для Compass)
    volumes:
      - mongo_data:/data/db    # данные сохраняются между перезапусками
    environment:
      MONGO_INITDB_DATABASE: otlichnikmusic

  # Бэкенд Node.js
  backend:
    build: ./backend
    container_name: otlichnikmusic-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017/otlichnikmusic   # "mongo" — имя сервиса выше
      PORT: 5000
      JWT_SECRET: твой_секрет
    depends_on:
      - mongo                  # бэкенд стартует только после MongoDB
    volumes:
      - ./backend:/app          # hot-reload: изменения видны без пересборки
      - /app/node_modules      # не перезаписывать node_modules с хоста

  # Фронтенд (статика через nginx)
  frontend:
    build: ./frontend
    container_name: otlichnikmusic-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html

volumes:
  mongo_data:   # именованный volume для персистентности данных